version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: UTC
    open-pull-requests-limit: 10

  - package-ecosystem: pip
    directory: /services/calc-engine
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
      timezone: UTC
    open-pull-requests-limit: 10
