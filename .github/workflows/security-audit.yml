name: Security Audit

on:
  pull_request:
  push:
    branches:
      - main
      - main-backup2
  schedule:
    - cron: '0 3 * * 1'

jobs:
  node-audit:
    name: Node Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (moderate+)
        run: npm audit --audit-level=moderate

  python-audit:
    name: Python Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Run pip audit
        run: python -m pip_audit -r services/calc-engine/requirements.txt
